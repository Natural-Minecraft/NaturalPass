# Battle Pass Free Rewards Configuration
#
# Single item reward:
#   level-X:
#     material: DIAMOND
#     amount: 5
#
# Command reward:
#   level-X:
#     command: "eco give <player> 1000"
#     display: "$1000"
#
# Multiple rewards in one level:
#   level-X:
#     items:
#       reward1:
#         material: DIAMOND
#         amount: 5
#       reward2:
#         command: "kit vip <player>"
#         display: "VIP Kit"
#
# <player> will be replaced with the player's name

level-1:
  items:
    item1:
      material: IRON_INGOT
      amount: 16
    coin:
      command: naturalcoin give <player> 1
      display: 1x Natural Coin
